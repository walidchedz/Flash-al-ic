<!DOCTYPE html>
<html>
<head>
    <title>FINAL SaaS</title>
</head>
<body style="background:#111;color:#0f0;font-family:Arial">

<h1>🧠 SaaS Platform</h1>

<button onclick="login()">Login</button>
<button onclick="dash()">Dashboard</button>
<button onclick="market()">Market</button>

<pre id="out"></pre>

<script>
const API = "http://127.0.0.1:8000";

async function login(){
    let r = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:"admin",password:"1234"})
    });
    out.innerText = await r.text();
}

async function dash(){
    let r = await fetch(API+"/dashboard");
    out.innerText = await r.text();
}

async function market(){
    let r = await fetch(API+"/market");
    out.innerText = await r.text();
}
</script>

<pre id="out"></pre>

</body>
</html>
